<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content</title>
    <link rel="stylesheet" href="style.css">
    <script>
    function goToGifPreview(){
        localStorage.setItem("contentType", "gif");
        localStorage.setItem("mediaScale", document.getElementById("mediaScale").value);
        localStorage.setItem("mediaScroll", document.getElementById("mediaScroll").value);
        localStorage.setItem("mediaSpeed", document.getElementById("mediaSpeed").value);
        window.location.href = "preview.html";
    }

    if(!localStorage.getItem("userEmail")){
        window.location.href = "index.html";
    }
    </script>
</head>
<body>

    <div class="login-box">
        <button class="logout-btn" onclick="logout()">Sign Out</button>
        <h1>Upload GIF</h1>

        <div class="storage-box">
            <h3>Storage Used</h3>
            <div class="progress-bar"><div id="progressFill"></div></div>
            <p id="storageText">0 MB / 5 MB Used</p>
        </div>

        <p id="userInfo"></p>
        <p class="subtitle">Choose what you want to display</p>
        
        <h3 class="format-title">Supported Formats</h3>
        <div class="formats">
            <span>GIF</span>
        </div>

        <div class="drag-area">
            <p>📁 Drag & Drop File Here</p>
            <p>or</p>
            <input type="file" id="fileInput" accept=".gif" onchange="previewImage(event)">
            <button type="button" onclick="document.getElementById('fileInput').click()">Browse File</button>
            <p id="fileName"></p>
            
            <img id="previewImage" src="" alt="Preview Image" style="display:none; max-width: 100%;">

            <div style="margin-top: 20px; text-align: left; background: #1e293b; padding: 15px; border-radius: 8px;">
                <label style="color: white; font-weight: bold; display: block; margin-bottom: 5px;">Media Scale (%):</label>
                <input type="number" id="mediaScale" value="100" min="10" max="300" style="width: 100%; padding: 8px; border-radius: 5px; margin-bottom: 15px; border: none;">
                
                <label style="color: white; font-weight: bold; display: block; margin-bottom: 5px;">Panoramic Scroll:</label>
                <select id="mediaScroll" style="width: 100%; padding: 8px; border-radius: 5px; margin-bottom: 15px; border: none;">
                    <option value="false">Off (Static)</option>
                    <option value="true">On (Scrolling)</option>
                </select>

                <label style="color: white; font-weight: bold; display: block; margin-bottom: 5px;">Scroll Speed (1=Slow, 10=Fast):</label>
                <input type="number" id="mediaSpeed" value="5" min="1" max="10" style="width: 100%; padding: 8px; border-radius: 5px; border: none;">
            </div>

            <p class="file-info">
                Supported: GIF<br><br>
                Recommended LED Resolution: 640 × 80 px
            </p>
        </div>

        <div class="navigation">
            <button onclick="window.location.href='upload.html'">Back</button>
            <button id="nextBtn" onclick="goToGifPreview()">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
