<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Content</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
         <button class="logout-btn" onclick="logout()">Sign Out</button>
        <h1>Preview Content</h1>
        <p class="subtitle">Review before publishing</p>

        <div class="preview-page">
            <div class="preview-left">
                <h3>Display Preview</h3>
                <div class="preview-image-box" id="previewContainer"></div>
            </div>

            <div class="preview-right">
                <h3>Display Info</h3>
                <div class="info-card">
                    <p id="typeInfo"></p>
                    <p id="resolutionInfo">Resolution:</p>
                    <p id="storageInfo">Storage Used:</p>
                    <p id="sizeInfo"></p>
                    <p id="scrollInfo"></p>
                    <p id="colorInfo"></p>
                    <p><strong>LED Display:</strong> 640 × 80 px</p>
                    <p><strong>Status:</strong> Ready To Publish</p>
                </div>
            </div>
        </div>

        <div class="navigation">
            <button onclick="goBack()">Back</button>
            <button onclick="window.location.href='publish.html'">Publish</button>
        </div>
    </div>

<script>
const type = localStorage.getItem("contentType");
const container = document.getElementById("previewContainer");
document.getElementById("typeInfo").innerHTML = "<strong>Type:</strong> " + (type ? type.toUpperCase() : "UNKNOWN");

/* MEDIA (IMAGE/VIDEO/GIF) */
if(type === "image" || type === "gif"){
    let imageData = localStorage.getItem("uploadedImage");
    container.innerHTML = `<img src="${imageData}" class="final-preview-image">`;
    document.getElementById("sizeInfo").innerHTML = "<strong>Scale:</strong> " + (localStorage.getItem("mediaScale") || "100") + "%";
    document.getElementById("scrollInfo").innerHTML = "<strong>Scroll:</strong> " + (localStorage.getItem("mediaScroll") === "true" ? "ON" : "OFF");
    document.getElementById("colorInfo").style.display = "none";
}

if(type === "video"){
    let videoData = localStorage.getItem("uploadedVideo");
    container.innerHTML = `<video src="${videoData}" controls autoplay muted style="width:100%; border-radius:10px;"></video>`;
    document.getElementById("sizeInfo").innerHTML = "<strong>Scale:</strong> " + (localStorage.getItem("mediaScale") || "100") + "%";
    document.getElementById("scrollInfo").innerHTML = "<strong>Scroll:</strong> " + (localStorage.getItem("mediaScroll") === "true" ? "ON" : "OFF");
    document.getElementById("colorInfo").style.display = "none";
}

/* TEXT */
if(type === "text"){
    let text = localStorage.getItem("displayText");
    let scale = localStorage.getItem("textScale");
    let textColor = localStorage.getItem("textColor");
    let bgColor = localStorage.getItem("bgColor");
    
    container.innerHTML = `<div class="preview-box" style="color:${textColor}; background:${bgColor};">${text}</div>`;
    document.getElementById("resolutionInfo").style.display = "none";
    document.getElementById("storageInfo").style.display = "none";
    
    document.getElementById("sizeInfo").innerHTML = "<strong>Text Size:</strong> " + scale + "x";
    document.getElementById("scrollInfo").innerHTML = "<strong>Scroll:</strong> " + (localStorage.getItem("textScroll") === "true" ? "ON" : "OFF");
    document.getElementById("colorInfo").innerHTML = "<strong>Colour:</strong> " + textColor + "<br><strong>Background:</strong> " + bgColor;
}

/* IMAGE INFO */
let width = localStorage.getItem("imageWidth");
let height = localStorage.getItem("imageHeight");
if(width && height && type !== "text"){
    document.getElementById("resolutionInfo").innerHTML = "<strong>Original Res:</strong> " + width + " × " + height;
}

let storage = localStorage.getItem("storageUsed");
if(storage && type !== "text"){
    document.getElementById("storageInfo").innerHTML = "<strong>Storage Used:</strong> " + storage + " MB";
}

function goBack(){
    if(type==="image") window.location.href = "upload-image.html";
    else if(type==="gif") window.location.href = "upload-gif.html";
    else if(type==="video") window.location.href = "upload-video.html";
    else if(type==="text") window.location.href = "text-colour.html";
}
</script>
<script src="script.js"></script>
</body>
</html>
